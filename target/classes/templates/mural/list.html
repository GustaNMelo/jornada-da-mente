<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Mural de Apoio')}"></head>
<body>
<div class="app-layout">
  <aside th:replace="~{fragments/sidebar :: sidebar('mural')}"></aside>

  <main class="main-content">
    <div class="main-header">
      <h1>Mural de Apoio</h1>
      <span class="date" th:text="${#temporals.format(dataAtual, 'dd/MM/yyyy')}"></span>
    </div>

    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <form th:action="@{/mural/publicar}" method="post" class="mural-compose">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <textarea name="texto" class="form-control" rows="2" maxlength="300"
                placeholder="Compartilhe uma mensagem de apoio..." required></textarea>
      <button type="submit" class="btn btn-primary mural-send-btn">💬 Enviar</button>
    </form>

    <div th:if="${#lists.isEmpty(mensagens)}" class="empty-state">
      Nenhuma mensagem ainda. Seja o primeiro a compartilhar um pouco de apoio!
    </div>

    <div th:each="mensagem : ${mensagens}"
         class="mural-card"
         th:classappend="${mensagem.autor.id == usuario.id} ? 'own'">
      <div class="mural-avatar" th:classappend="'avatar-' + ${mensagem.autor.id % 4}"
           th:text="${#strings.toUpperCase(#strings.substring(mensagem.autor.nome, 0, 1))}"></div>

      <div class="mural-card-body">
        <div class="mural-card-header">
          <span class="mural-author" th:text="${mensagem.autor.nome}"></span>
          <form th:if="${mensagem.autor.id == usuario.id}"
                th:action="@{/mural/{id}/excluir(id=${mensagem.id})}" method="post"
                data-confirm-titulo="Excluir mensagem"
                data-confirm="Tem certeza que deseja excluir esta mensagem do mural? Essa ação não pode ser desfeita."
                data-confirm-label="Excluir mensagem">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <button type="submit" class="btn btn-secondary btn-sm mural-delete-btn" title="Excluir mensagem">✕</button>
          </form>
        </div>
        <p class="mural-text" th:text="${mensagem.texto}"></p>
        <span class="mural-time" th:text="${tempoRelativo.get(mensagem.id)}"></span>
      </div>

      <form th:action="@{/mural/{id}/curtir(id=${mensagem.id})}" method="post" class="mural-like-form">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="mural-like-btn" th:classappend="${curtidoPorMim.get(mensagem.id)} ? 'liked'">
          <span class="mural-heart">❤</span>
          <span th:if="${curtidasPorMensagem.get(mensagem.id) > 0}" th:text="${curtidasPorMensagem.get(mensagem.id)}"></span>
        </button>
      </form>
    </div>
  </main>
</div>
</body>
</html>
