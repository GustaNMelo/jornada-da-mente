<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Nova meta')}"></head>
<body>
<div class="app-layout">
  <aside th:replace="~{fragments/sidebar :: sidebar('metas')}"></aside>

  <main class="main-content">
    <div class="main-header">
      <h1>Nova meta</h1>
    </div>

    <div class="card" style="max-width:480px;">
      <form th:action="@{/metas/salvar}" th:object="${meta}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <div class="form-group">
          <label for="titulo">Título</label>
          <input class="form-control" type="text" id="titulo" th:field="*{titulo}" required />
        </div>
        <div class="form-group">
          <label for="descricao">Descrição</label>
          <input class="form-control" type="text" id="descricao" th:field="*{descricao}" />
        </div>
        <div class="form-group">
          <label for="pontos">Pontos</label>
          <input class="form-control" type="number" id="pontos" th:field="*{pontos}" min="1" required />
        </div>
        <div class="form-group">
          <label for="dataReferencia">Data</label>
          <input class="form-control" type="date" id="dataReferencia" th:field="*{dataReferencia}" required />
        </div>
        <div style="display:flex; gap:10px;">
          <button type="submit" class="btn btn-primary">Salvar meta</button>
          <a th:href="@{/metas}" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </main>
</div>
</body>
</html>
