<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <img th:src="@{/images/logo-tela-login.png}" alt="Jornada da Mente" />
    </div>
    <p class="auth-subtitle">Bem-vindo de volta</p>

    <div th:if="${param.erro}" class="alert alert-danger">E-mail ou senha inválidos.</div>
    <div th:if="${param.sessaoExpirada}" class="alert alert-danger">Sua sessão expirou. Faça login novamente.</div>
    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

    <form th:action="@{/login}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="form-group">
        <label for="username">E-mail</label>
        <input class="form-control" type="email" id="username" name="username" required autofocus />
      </div>
      <div class="form-group">
        <label for="password">Senha</label>
        <input class="form-control" type="password" id="password" name="password" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Entrar</button>
    </form>

    <p class="auth-footer">Não tem conta? <a th:href="@{/cadastro}">Criar conta</a></p>
  </div>
</div>
</body>
</html>
