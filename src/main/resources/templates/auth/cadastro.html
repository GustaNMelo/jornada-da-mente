<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Criar conta')}"></head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <img th:src="@{/images/logo-tela-login.png}" alt="Jornada da Mente" />
    </div>
    <p class="auth-subtitle">Crie sua conta e comece sua jornada</p>

    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <form th:action="@{/cadastro/salvar}" th:object="${usuario}" method="post">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
      <div class="form-group">
        <label for="nome">Nome</label>
        <input class="form-control" type="text" id="nome" th:field="*{nome}" required autofocus />
      </div>
      <div class="form-group">
        <label for="email">E-mail</label>
        <input class="form-control" type="email" id="email" th:field="*{email}" required />
      </div>
      <div class="form-group">
        <label for="senha">Senha</label>
        <input class="form-control" type="password" id="senha" th:field="*{senha}" required minlength="6" />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Criar conta</button>
    </form>

    <p class="auth-footer">Já tem conta? <a th:href="@{/login}">Entrar</a></p>
  </div>
</div>
</body>
</html>
