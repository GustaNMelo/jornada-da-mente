<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Convites de desafio')}"></head>
<body>
<div class="app-layout">
  <aside th:replace="~{fragments/sidebar :: sidebar('desafios')}"></aside>

  <main class="main-content">
    <div class="main-header">
      <h1>Meus convites</h1>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>

    <a th:href="@{/desafios}" class="btn btn-secondary" style="margin-bottom:18px;">← Voltar para Desafios</a>

    <div th:if="${#lists.isEmpty(convites)}" class="empty-state">Você não tem convites pendentes.</div>

    <div th:each="convite : ${convites}" class="list-item">
      <div class="list-item-left">
        <span style="font-size:20px;">🚩</span>
        <div>
          <div class="list-item-title" th:text="${convite.desafio.titulo}"></div>
          <div class="list-item-subtitle"
               th:text="${'Convidado por ' + (convite.convidadoPor != null ? convite.convidadoPor.nome : 'alguém') + ' • ' + convite.desafio.duracaoDias + ' dias'}"></div>
        </div>
      </div>
      <div style="display:flex; align-items:center; gap:10px;">
        <form th:action="@{/desafios/convites/{id}/aceitar(id=${convite.id})}" method="post">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" class="btn btn-primary btn-sm">Aceitar</button>
        </form>
        <form th:action="@{/desafios/convites/{id}/recusar(id=${convite.id})}" method="post"
              data-confirm-titulo="Recusar convite"
              th:data-confirm="'Tem certeza que deseja recusar o convite para o desafio &quot;' + ${convite.desafio.titulo} + '&quot;?'"
              data-confirm-label="Recusar convite">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button type="submit" class="btn btn-secondary btn-sm">Recusar</button>
        </form>
      </div>
    </div>
  </main>
</div>
</body>
</html>
