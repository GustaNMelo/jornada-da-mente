<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Metas')}"></head>
<body>
<div class="app-layout">
  <aside th:replace="~{fragments/sidebar :: sidebar('metas')}"></aside>

  <main class="main-content">
    <div class="main-header">
      <h1>Metas</h1>
      <span class="date" th:text="${#temporals.format(dataAtual, 'dd/MM/yyyy')}"></span>
    </div>

    <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
    <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

    <div style="display:flex; gap:10px; margin-bottom:22px; flex-wrap:wrap;">
      <a th:href="@{/metas/nova}" class="btn btn-primary">+ Nova meta</a>
      <form th:action="@{/metas/simular-dia}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="btn btn-secondary" title="Apenas para demonstração">⏭ Simular novo dia</button>
      </form>
    </div>

    <div th:if="${!#lists.isEmpty(metasAtrasadas)}">
      <h3 style="font-size:15px; color:var(--amber);">⏰ Atrasadas</h3>
      <div th:replace="~{metas/list :: itens(${metasAtrasadas})}"></div>
    </div>

    <h3 style="font-size:15px;">📅 Hoje</h3>
    <div th:if="${#lists.isEmpty(metasHoje)}" class="empty-state">Nenhuma meta para hoje.</div>
    <div th:replace="~{metas/list :: itens(${metasHoje})}"></div>

    <h3 style="font-size:15px; margin-top:24px;">📅 Amanhã</h3>
    <div th:if="${#lists.isEmpty(metasAmanha)}" class="empty-state">Nenhuma meta para amanhã.</div>
    <div th:replace="~{metas/list :: itens(${metasAmanha})}"></div>

    <div th:if="${!#lists.isEmpty(metasFuturas)}">
      <h3 style="font-size:15px; margin-top:24px;">🗓️ Mais adiante</h3>
      <div th:replace="~{metas/list :: itens(${metasFuturas})}"></div>
    </div>
  </main>
</div>

<div th:fragment="itens(lista)">
  <div th:each="meta : ${lista}"
       class="list-item"
       th:classappend="${metaAlteradaId != null and meta.id == metaAlteradaId} ? 'just-changed'">
    <div class="list-item-left">
      <form th:if="${!meta.concluida}" th:action="@{/metas/{id}/concluir(id=${meta.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="check-circle" title="Marcar como feito"></button>
      </form>
      <form th:if="${meta.concluida}" th:action="@{/metas/{id}/desmarcar(id=${meta.id})}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="check-circle done" title="Desmarcar">✓</button>
      </form>
      <div>
        <div class="list-item-title" th:text="${meta.titulo}"></div>
        <div class="list-item-subtitle">
          <span th:text="${meta.descricao}"></span>
          <span th:if="${meta.dataReferencia != hoje}"
                th:text="' • ' + ${#temporals.format(meta.dataReferencia, 'dd/MM')}"></span>
        </div>
      </div>
    </div>
    <div style="display:flex; align-items:center; gap:14px;">
      <span th:if="${meta.concluida}" style="color:var(--green-text); font-weight:700; font-size:14px;" th:text="'+ ' + ${meta.pontos} + ' pts'"></span>
      <span th:if="${!meta.concluida and meta.dataReferencia.isBefore(hoje)}" class="badge badge-amber">Atrasada</span>
      <span th:if="${!meta.concluida and !meta.dataReferencia.isBefore(hoje)}" class="badge badge-amber">Pendente</span>
      <form th:action="@{/metas/{id}/excluir(id=${meta.id})}" method="post"
            data-confirm-titulo="Excluir meta"
            data-confirm="Tem certeza que deseja excluir esta meta? Essa ação não pode ser desfeita."
            data-confirm-label="Excluir meta">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="btn btn-secondary btn-sm" title="Excluir">✕</button>
      </form>
    </div>
  </div>
</div>

<script th:if="${tocarSom}">
  document.addEventListener('DOMContentLoaded', function () {
    if (typeof tocarSomSucesso === 'function') { tocarSomSucesso(); }
  });
</script>
</body>
</html>
