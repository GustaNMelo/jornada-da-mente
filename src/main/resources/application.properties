spring.application.name=jornada-da-mente

# Banco H2 em arquivo - os dados persistem entre reinicializacoes
spring.datasource.url=jdbc:h2:file:./data/jornadadamente;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Console H2 para inspecionar o banco em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
